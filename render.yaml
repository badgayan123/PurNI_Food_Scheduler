services:
  - type: web
    name: purni-menu
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    # Optional: Add USDA_API_KEY in Render dashboard for better nutrition lookup
